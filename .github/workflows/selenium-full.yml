name: Full Selenium CI Pipeline

on:
  push:
    branches: [ main, feature/vpbank-payment ]
  pull_request:
    branches: [ main, feature/vpbank-payment ]
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests (${{ matrix.browser }})
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=dev -DsuiteXmlFile=testng-smoke.xml
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Allure results (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/
          retention-days: 7

  publish-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download Allure results - Chrome
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: target/allure-results/

      - name: Download Allure results - Firefox
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: target/allure-results/

      - name: Checkout gh-pages history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history
        if: always()
        shell: bash
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/
          fi

      - name: Verify merged results
        shell: bash
        run: |
          echo "=== Allure results count ==="
          ls target/allure-results/ | wc -l
          ls target/allure-results/ | head -10

      - name: Generate Allure report
        run: mvn -B -DskipTests allure:report

      - name: Deploy Allure Report to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-maven-plugin

  payment-test:
    if: github.base_ref == 'feature/vpbank-payment' || github.ref == 'refs/heads/feature/vpbank-payment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Payment Tests
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-payment.xml
        env:
          VPBANK_API_KEY: ${{ secrets.VPBANK_API_KEY }}
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Payment Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-test-results
          path: |
            target/allure-results/
            target/surefire-reports/
          retention-days: 14