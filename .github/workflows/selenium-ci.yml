name: Selenium CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      intentional_fail:
        description: 'Set true to force the intentional failing test'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve pipeline mode
        shell: bash
        run: |
          INTENTIONAL_FAIL="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.intentional_fail }}" == "true" ]]; then
            INTENTIONAL_FAIL="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.head_commit.message }}" == *"[red-ci]"* ]]; then
            INTENTIONAL_FAIL="true"
          fi

          echo "INTENTIONAL_FAIL=$INTENTIONAL_FAIL" >> "$GITHUB_ENV"
          echo "[CI] intentional.fail=$INTENTIONAL_FAIL"

      - name: Run Selenium Smoke Tests (${{ matrix.browser }})
        run: |
          mvn clean test \
            -Dbrowser=${{ matrix.browser }} \
            -Denv=dev \
            -DsuiteXmlFile=testng-smoke.xml \
            -Dintentional.fail=${INTENTIONAL_FAIL}
        env:
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}

      - name: Upload test artifacts (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 30
